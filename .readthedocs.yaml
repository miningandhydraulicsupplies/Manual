# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: conf.py
  fail_on_warning: false

# Specify build output directory
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp -r _build/html/* $READTHEDOCS_OUTPUT/html/ || true

# Build documentation with MkDocs (alternative to Sphinx)
# Uncomment if you prefer MkDocs over Sphinx
# mkdocs:
#   configuration: mkdocs.yml

# Optionally build your docs in additional formats such as PDF and ePub
formats:
  - pdf
  - epub

# Python requirements for building docs
python:
  install:
    - requirements: requirements.txt

